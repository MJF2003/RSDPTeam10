bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    enable_groot_monitoring: True
    groot_zmq_publisher_port: 1666
    groot_zmq_server_port: 1667
    #plugin_lib_names:
    #- nav2_compute_path_to_pose_action_bt_node
    #- nav2_follow_path_action_bt_node
    #- nav2_back_up_action_bt_node
    #- nav2_spin_action_bt_node
    #- nav2_wait_action_bt_node
    #- nav2_clear_costmap_service_bt_node
    #- nav2_recovery_node_bt_node
    #- nav2_pipeline_sequence_bt_node
controller_server:
  ros__parameters:
    controller_plugins: ["FollowPath"]
    controller_frequency: 20.0
    failure_tolerance: 0.3
    odom_topic: "odom"
    goal_checker_plugins: ["general_goal_checker"]
    progress_checker_plugin: "progress_checker"

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 20.0
    
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 0.15
      stateful: True
    
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.25
      lookahead_dist: 0.35
      min_lookahead_dist: 0.25
      max_lookahead_dist: 0.50
      lookahead_time: 1.5
      use_velocity_scaled_lookahead_dist: False
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6
      use_collision_detection: True
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: True
      use_cost_regulated_linear_velocity_scaling: False
      regulated_linear_scaling_min_radius: 0.75
      regulated_linear_scaling_min_speed: 0.15
      use_fixed_curvature_lookahead: False
      curvature_lookahead_dist: 0.35
      use_rotate_to_heading: True
      rotate_to_heading_angular_vel: 1.0
      rotate_to_heading_min_angle: 0.5
      allow_reversing: False
      max_angular_accel: 2.0
      transform_tolerance: 0.2
      stateful: True

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      transform_tolerance: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.1
      footprint: "[ [0.5, 0.3], [0.5, -0.3], [-0.5, -0.3], [-0.5, 0.3] ]"
      plugins: ["voxel_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0
        inflation_radius: 1.0
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.1
        z_voxels: 10
        max_obstacle_height: 1.0
        mark_threshold: 1
        observation_sources: scan semantic_obstacles
        scan:
          topic: /scan
          max_obstacle_height: 1.0
          min_obstacle_height: 0.0
          obstacle_max_range: 8.0
          obstacle_min_range: 0.0
          raytrace_max_range: 8.5
          raytrace_min_range: 0.0
          clearing: True
          marking: True
          data_type: "LaserScan"
        semantic_obstacles:
          topic: /controller/semantic_obstacles
          max_obstacle_height: 1.0
          min_obstacle_height: 0.0
          obstacle_max_range: 20.0
          obstacle_min_range: 0.0
          clearing: False
          marking: True
          data_type: "PointCloud2"

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      transform_tolerance: 2.0
      global_frame: map
      robot_base_frame: base_link
      footprint: "[ [0.5, 0.3], [0.5, -0.3], [-0.5, -0.3], [-0.5, 0.3] ]"
      resolution: 0.1
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan semantic_obstacles
        scan:
          topic: /scan
          max_obstacle_height: 1.0
          min_obstacle_height: 0.0
          obstacle_max_range: 8.0
          obstacle_min_range: 0.0
          raytrace_max_range: 8.5
          raytrace_min_range: 0.0
          clearing: True
          marking: True
          data_type: "LaserScan"
        semantic_obstacles:
          topic: /controller/semantic_obstacles
          max_obstacle_height: 1.0
          min_obstacle_height: 0.0
          obstacle_max_range: 20.0
          obstacle_min_range: 0.0
          clearing: False
          marking: True
          data_type: "PointCloud2"
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.8

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: true
      allow_unknown: false

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    recovery_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    wait:
      plugin: "nav2_behaviors::Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_timeout: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2
